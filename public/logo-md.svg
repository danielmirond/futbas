<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 72">
  <!-- Background -->
  <rect width="220" height="72" fill="#111"/>

  <!-- Left red diagonal bar (leans right, like italic) -->
  <polygon points="7,2 15,2 9,70 1,70" fill="#E30613"/>

  <!-- Right red diagonal bar -->
  <polygon points="205,2 213,2 219,70 211,70" fill="#E30613"/>

  <!-- MUNDO — large, yellow, bold italic -->
  <text x="22" y="44"
    font-family="Impact,'Arial Narrow',Arial,sans-serif"
    font-size="42" font-style="italic" font-weight="900"
    fill="#FFD700">MUNDO</text>

  <!-- DEPORTIVO — white, bold italic, smaller -->
  <text x="22" y="68"
    font-family="Impact,'Arial Narrow',Arial,sans-serif"
    font-size="25" font-style="italic" font-weight="900"
    fill="#ffffff">DEPORTIVO</text>
</svg>
